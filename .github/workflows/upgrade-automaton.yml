name: Upgrade Named Automaton

on:
  workflow_dispatch:
    inputs:
      canister_id:
        description: Existing automaton canister principal to upgrade in place.
        required: true
        type: string
      environment_version:
        description: Optional release label.
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-release:
    uses: ./.github/workflows/publish-playground-images.yml
    with:
      environment_version: ${{ inputs.environment_version }}
    secrets: inherit

  upgrade:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: playground-vps
    needs: [build-release]
    steps:
      - name: Download immutable release bundle
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-release.outputs.release_artifact_name }}
          path: ${{ runner.temp }}/release
      - name: Prepare SSH files
        shell: bash
        env:
          VPS_KNOWN_HOSTS: ${{ secrets.PLAYGROUND_VPS_KNOWN_HOSTS }}
          VPS_SSH_KEY: ${{ secrets.PLAYGROUND_VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$VPS_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          printf '%s\n' "$VPS_SSH_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
      - name: Stage exact source and upgrade named canister
        shell: bash
        env:
          VPS_HOST: ${{ secrets.PLAYGROUND_VPS_HOST }}
          VPS_PORT: ${{ secrets.PLAYGROUND_VPS_PORT }}
          VPS_USER: ${{ secrets.PLAYGROUND_VPS_USER }}
          PLAYGROUND_ENV_FILE: /etc/automaton-playground/playground.env
          PLAYGROUND_STATE_DIR: /srv/automaton-playground/state
        run: |
          set -euo pipefail
          port="${VPS_PORT:-22}"
          commit='${{ needs.build-release.outputs.git_commit }}'
          remote_bundle="/tmp/automaton-release-${commit}"
          state_root="${PLAYGROUND_STATE_DIR}/releases/staged-${commit}"
          ssh -p "$port" "$VPS_USER@$VPS_HOST" "rm -rf '$remote_bundle' '$state_root'; mkdir -p '$remote_bundle' '$state_root/source'"
          scp -P "$port" -r "$RUNNER_TEMP/release/." "$VPS_USER@$VPS_HOST:$remote_bundle/"
          ssh -p "$port" "$VPS_USER@$VPS_HOST" \
            "set -euo pipefail; cd '$remote_bundle'; sha256sum -c source-ops.tar.gz.sha256; tar -xzf source-ops.tar.gz --strip-components=1 -C '$state_root/source'; cp release-manifest.json automaton.wasm factory.wasm automaton.wasm.sha256 factory.wasm.sha256 source-commit.txt '$state_root/'; cp source-commit.txt '$state_root/source/source-commit.txt'; PLAYGROUND_ENV_FILE='$PLAYGROUND_ENV_FILE' PLAYGROUND_RELEASE_BUNDLE_DIR='$state_root' PLAYGROUND_RELEASES_DIR='$PLAYGROUND_STATE_DIR/releases/applied' PLAYGROUND_UPGRADE_APPROVED=1 bash '$state_root/source/scripts/deploy-playground-release.sh' --manifest '$state_root/release-manifest.json' --mode upgrade-named --canister-id '${{ inputs.canister_id }}' --require-staged-source; rm -rf '$remote_bundle'"
