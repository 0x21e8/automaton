name: Publish Atomic Playground Release

on:
  workflow_call:
    inputs:
      environment_version:
        description: Optional release label recorded in the manifest.
        required: false
        type: string
    outputs:
      git_commit:
        description: Release source commit.
        value: ${{ jobs.build-release.outputs.git_commit }}
      environment_version:
        description: Release environment version.
        value: ${{ jobs.build-release.outputs.environment_version }}
      web_image_ref:
        description: Digest-pinned web image ref.
        value: ${{ jobs.build-release.outputs.web_image_ref }}
      indexer_image_ref:
        description: Digest-pinned indexer image ref.
        value: ${{ jobs.build-release.outputs.indexer_image_ref }}
      rpc_gateway_image_ref:
        description: Digest-pinned RPC gateway image ref.
        value: ${{ jobs.build-release.outputs.rpc_gateway_image_ref }}
      release_artifact_name:
        description: Immutable workflow artifact bundle containing the manifest and release bytes.
        value: ${{ jobs.build-release.outputs.release_artifact_name }}
  workflow_dispatch:
    inputs:
      environment_version:
        description: Optional release label recorded in the manifest.
        required: false
        type: string

concurrency:
  group: atomic-playground-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    outputs:
      git_commit: ${{ steps.manifest.outputs.git_commit }}
      environment_version: ${{ steps.manifest.outputs.environment_version }}
      web_image_ref: ${{ steps.manifest.outputs.web_image_ref }}
      indexer_image_ref: ${{ steps.manifest.outputs.indexer_image_ref }}
      rpc_gateway_image_ref: ${{ steps.manifest.outputs.rpc_gateway_image_ref }}
      release_artifact_name: ${{ steps.bundle.outputs.release_artifact_name }}

    steps:
      - name: Checkout exact release revision
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require clean release source
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(git status --porcelain --untracked-files=all)"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install locked Node dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1,wasm32-unknown-unknown

      - name: Setup Foundry
        shell: bash
        run: |
          set -euo pipefail
          curl -L https://foundry.paradigm.xyz | bash
          "$HOME/.foundry/bin/foundryup"
          echo "$HOME/.foundry/bin" >> "$GITHUB_PATH"

      - name: Install Wasm tooling
        shell: bash
        run: cargo install --locked wasi2ic candid-extractor ic-wasm

      - name: Validate source and workspace
        shell: bash
        run: |
          set -euo pipefail
          npm run lint
          npm test
          cargo test --workspace
          npm run evm:test
          npm run verify:strategies

      - name: Build child artifact
        shell: bash
        run: ./components/ic-automaton/scripts/build-backend-wasm.sh dist/automaton.wasm

      - name: Build factory artifact
        shell: bash
        run: ./scripts/build-factory-wasm.sh dist/factory.wasm

      - name: Validate built contracts
        shell: bash
        run: |
          set -euo pipefail
          CHILD_WASM_PATH=dist/automaton.wasm npm run verify:child-contract
          mkdir -p "$RUNNER_TEMP/pocketic"
          curl -LfsS https://github.com/dfinity/pocketic/releases/download/9.0.3/pocket-ic-x86_64-linux.gz -o "$RUNNER_TEMP/pocketic/server.gz"
          gzip -df "$RUNNER_TEMP/pocketic/server.gz"
          chmod +x "$RUNNER_TEMP/pocketic/server"
          POCKET_IC_BIN="$RUNNER_TEMP/pocketic/server" \
          AUTOMATON_WASM_PATH=dist/automaton.wasm \
          FACTORY_WASM_PATH=dist/factory.wasm \
            cargo test -p integration-tests --test spawn_contract spawn_contract -- --exact

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Setup buildx
        run: docker buildx create --driver docker-container --name "atomic-builder-${GITHUB_RUN_ID}" --use

      - name: Build and publish digest-addressed images
        shell: bash
        env:
          IMAGE_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          owner=$(printf '%s' "$IMAGE_OWNER" | tr '[:upper:]' '[:lower:]')
          build_and_push() {
            local name="$1"
            local dockerfile="$2"
            local metadata_file="$RUNNER_TEMP/${name}-metadata.json"
            docker buildx build --platform linux/amd64 --push \
              --metadata-file "$metadata_file" \
              -f "$dockerfile" \
              -t "ghcr.io/${owner}/automaton-playground-${name}:$GITHUB_SHA" \
              -t "ghcr.io/${owner}/automaton-playground-${name}:main" \
              "$@" .
          }
          build_and_push web apps/web/Dockerfile --build-arg VITE_INDEXER_BASE_URL=
          build_and_push indexer apps/indexer/Dockerfile
          build_and_push rpc-gateway apps/rpc-gateway/Dockerfile

      - name: Render schema-v2 release manifest
        id: manifest
        shell: bash
        env:
          RELEASE_ENVIRONMENT_VERSION: ${{ inputs.environment_version || github.event.inputs.environment_version }}
        run: |
          set -euo pipefail
          owner=$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          for name in web indexer rpc-gateway; do
            metadata="$RUNNER_TEMP/${name}-metadata.json"
            digest=$(node --input-type=module -e 'import fs from "node:fs"; const v=JSON.parse(fs.readFileSync(process.argv[1],"utf8"))["containerimage.digest"]; if (!v?.startsWith("sha256:")) process.exit(1); console.log(v)' "$metadata")
            case "$name" in
              web) key=WEB ;;
              indexer) key=INDEXER ;;
              rpc-gateway) key=RPC_GATEWAY ;;
            esac
            printf '%s=%s\n' "RELEASE_${key}_IMAGE_REF" "ghcr.io/${owner}/automaton-playground-${name}@${digest}" >> "$RUNNER_TEMP/image-refs.env"
          done
          set -a
          . "$RUNNER_TEMP/image-refs.env"
          set +a
          node scripts/render-release-manifest.mjs --mode publish --output "$RUNNER_TEMP/release-manifest.json"
          node --input-type=module - "$RUNNER_TEMP/release-manifest.json" "$GITHUB_OUTPUT" <<'NODE'
          import fs from "node:fs";
          const manifest = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));
          const output = process.argv[3];
          const lines = [
            `git_commit=${manifest.release.sourceCommit}`,
            `environment_version=${manifest.release.environmentVersion}`,
            `web_image_ref=${manifest.images.web.ref}`,
            `indexer_image_ref=${manifest.images.indexer.ref}`,
            `rpc_gateway_image_ref=${manifest.images.rpcGateway.ref}`
          ];
          fs.appendFileSync(output, `${lines.join("\n")}\n`);
          NODE

      - name: Bundle source, ops, manifest, artifacts, and checksums
        id: bundle
        shell: bash
        run: |
          set -euo pipefail
          bundle="atomic-playground-release-${GITHUB_SHA}"
          mkdir -p "$RUNNER_TEMP/$bundle"
          cp "$RUNNER_TEMP/release-manifest.json" "$RUNNER_TEMP/$bundle/release-manifest.json"
          cp dist/automaton.wasm dist/automaton.wasm.sha256 dist/factory.wasm dist/factory.wasm.sha256 "$RUNNER_TEMP/$bundle/"
          printf '%s\n' "$GITHUB_SHA" > "$RUNNER_TEMP/$bundle/source-commit.txt"
          git archive --format=tar.gz --prefix="source-${GITHUB_SHA}/" "$GITHUB_SHA" > "$RUNNER_TEMP/$bundle/source-ops.tar.gz"
          (cd "$RUNNER_TEMP/$bundle" && sha256sum source-ops.tar.gz > source-ops.tar.gz.sha256)
          printf 'release_artifact_name=%s\n' "$bundle" >> "$GITHUB_OUTPUT"

      - name: Upload one immutable release bundle
        uses: actions/upload-artifact@v4
        with:
          name: atomic-playground-release-${{ github.sha }}
          path: ${{ runner.temp }}/atomic-playground-release-${{ github.sha }}
          if-no-files-found: error
