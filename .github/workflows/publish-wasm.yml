name: Publish Wasm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-wasm:
    name: Build and publish backend Wasm
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Wasm build tools
        uses: taiki-e/install-action@v2
        with:
          tool: wasi2ic@0.2.15,ic-wasm@0.9.10,candid-extractor@0.1.6

      - name: Build backend Wasm
        run: ./scripts/build-backend-wasm.sh

      - name: Package compressed Wasm
        run: |
          set -euo pipefail
          mkdir -p dist
          asset_path="dist/ic-automaton-${GITHUB_REF_NAME}.wasm"
          cp target/wasm32-wasip1/release/backend_nowasi.wasm "${asset_path}"
          gzip -n -9 "${asset_path}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ic-automaton-${{ github.ref_name }}-wasm
          path: dist/*.wasm.gz
          if-no-files-found: error

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.wasm.gz
          fail_on_unmatched_files: true
          generate_release_notes: true
