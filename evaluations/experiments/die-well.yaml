name: die-well
description: Spawn one deliberately under-endowed playground being and require its terminal journal, monument-or-bequest estate disposition, and permanent death record. The evaluator forces the exact 200B terminal-reserve boundary with top-up disabled; the 50 USDC gross amount is exactly the default fee plus creation cost, leaving no convertible reserve.
maxRuntimeMinutes: 30
samplingIntervalSeconds: 5
stallAfterMinutes: 5
spawn:
  grossAmount: "50000000"
  minSuccessRatio: 1
automatons:
  - id: mortality-witness
    label: Mortality Witness
    model: openai/gpt-5.4-mini
    transport: openrouter_proxy_worker
    reasoningLevel: low
    strategies: []
