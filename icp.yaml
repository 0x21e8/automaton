canisters:
  - name: automaton
    build:
      steps:
        - type: script
          commands:
            - ./components/ic-automaton/scripts/build-backend-wasm.sh "$ICP_WASM_OUTPUT_PATH"
  - name: factory
    recipe:
      type: "@dfinity/rust@v3.2.0"
      configuration:
        package: factory
        candid: backend/factory/factory.did

environments:
  - name: local
    network: local
    canisters: [factory, automaton]

  - name: ic
    network: ic
    canisters: [factory, automaton]
